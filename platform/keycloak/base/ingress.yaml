# Traefik Ingress for the shared Keycloak.
# Stage: TLS terminated at Traefik via cert-manager + Cloudflare DNS01.
# Prod: TLS will be terminated upstream at the Caddy reverse proxy on
#       auth.vivavida.life, and this Ingress will be replaced with one on the
#       `web` (HTTP) entrypoint when the prod migration plan runs.
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: keycloak
  namespace: keycloak
  labels:
    app.kubernetes.io/part-of: platformappsforge
    platformappsforge/service: keycloak
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - auth-stage.vivavida.life   # overlaid per env
      secretName: keycloak-tls
  rules:
    - host: auth-stage.vivavida.life
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: keycloak-service   # operator-managed Service
                port:
                  number: 8080
