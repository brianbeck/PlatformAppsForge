# vivavida.life login theme — a lightweight whitelabel over the stock Keycloak
# login theme. Keeps the base login.css (inherited from parent=keycloak) and
# layers brand overrides via vivavida.css. Selected per-realm by the conecta
# realm's `loginTheme: vivavida` (the teams realm is unaffected).
parent=keycloak
import=common/keycloak
styles=css/login.css css/vivavida.css
