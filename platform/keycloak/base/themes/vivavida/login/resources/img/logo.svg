<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 168 34" width="168" height="34" role="img" aria-label="vivavida.life">
  <!-- Brand-blue rounded square. Geometry matches apps/web/src/app/icon.svg
       (favicon) and the in-page Logo.tsx square: rx ≈ 27% of side. -->
  <rect x="0" y="5" width="24" height="24" rx="6.5" fill="#1A6EBF"/>
  <!-- Single white "v" drawn as a polyline so it renders identically across
       all browsers regardless of installed fonts. Same shape language as the
       favicon's points (10,11 16,22 22,11) on its 32-viewBox, scaled to fit
       this 24-square. -->
  <polyline points="7.5,13.25 12,21.5 16.5,13.25"
            fill="none" stroke="#fff" stroke-width="3"
            stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Wordmark: "vivavida" in vv-ink #10172a, ".life" in vv-muted #6b7385 —
       same color tokens as the in-page Logo.tsx wordmark span. -->
  <text x="33" y="23"
        font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-size="20" font-weight="700" letter-spacing="-0.4">
    <tspan fill="#10172a">vivavida</tspan><tspan fill="#6b7385">.life</tspan>
  </text>
</svg>
