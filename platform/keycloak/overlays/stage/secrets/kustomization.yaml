# Aggregates all sealed-secret files in this directory. Add files via:
#   kubeseal --context beck-stage-admin@beck-stage \
#            --controller-namespace sealed-secrets \
#            -o yaml < plain.yaml > <name>.yaml
# Then reference the new file by name in the resources list below.
#
# See ../../../README.md for the full sealing recipe per secret.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Empty until the user adds sealed secrets. Argo CD tolerates an empty
# kustomization; the keycloak instance won't start until at least
# keycloak-db-credentials is sealed and merged.
resources: []
