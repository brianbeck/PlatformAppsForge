# Keycloak Operator — wave 12, after CNPG (wave 5) and before the Keycloak
# instance (wave 15). Manifests vendored from keycloak/keycloak-k8s-resources
# pinned to 26.0.5 (see ../../../platform/keycloak-operator/README.md).
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: keycloak-operator
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          - env: "stage"
            project: "default"
  template:
    metadata:
      name: "keycloak-operator-{{env}}"
      namespace: argocd
      labels:
        app.kubernetes.io/part-of: platformappsforge
        platformappsforge/service: keycloak-operator
      annotations:
        argocd.argoproj.io/sync-wave: "12"
        notifications.argoproj.io/subscribe.on-health-degraded: ""
        notifications.argoproj.io/subscribe.on-sync-failed: ""
    spec:
      project: "{{project}}"
      source:
        repoURL: https://github.com/brianbeck/PlatformAppsForge.git
        targetRevision: main
        path: platform/keycloak-operator
        directory:
          recurse: true
      destination:
        server: https://kubernetes.default.svc
        namespace: keycloak
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
        retry:
          limit: 5
          backoff:
            duration: 30s
            factor: 2
            maxDuration: 5m
