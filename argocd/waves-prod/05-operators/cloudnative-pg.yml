# CloudNativePG operator — singleton per cluster.
# Wave 05: operators install before anything that consumes them.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: cloudnative-pg
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          - env: "prod"
            project: "default"
  template:
    metadata:
      name: "cloudnative-pg-{{env}}"
      namespace: argocd
      labels:
        app.kubernetes.io/part-of: platformappsforge
        platformappsforge/service: cloudnative-pg
      annotations:
        argocd.argoproj.io/sync-wave: "5"
        notifications.argoproj.io/subscribe.on-health-degraded: ""
        notifications.argoproj.io/subscribe.on-sync-failed: ""
    spec:
      project: "{{project}}"
      sources:
        - repoURL: https://cloudnative-pg.github.io/charts
          chart: cloudnative-pg
          targetRevision: "0.22.1"
          helm:
            valueFiles:
              - $values/platform/cloudnative-pg/base-values.yaml
              - "$values/platform/cloudnative-pg/overlays/{{env}}/values.yaml"
        - repoURL: https://github.com/brianbeck/PlatformAppsForge.git
          targetRevision: main
          ref: values
      destination:
        server: https://kubernetes.default.svc
        namespace: cnpg-system
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
        retry:
          limit: 5
          backoff:
            duration: 30s
            factor: 2
            maxDuration: 5m
